<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="script.js" defer></script>
        <link href="styles.css" rel="stylesheet" />
        <title>7th Hell</title>
    </head>
    <body>
        <main>
            <section class="characters-section">

                <h2 class="characters-section__title">Characters</h2>

                <div class="characters-section__scrollable">
                    <div class="character-card">
                        <img src="./images/kim_placeholder.png" alt="kim_placeholder" class="character-card__image" />
                        <div class="character-card__info">
                            <div class="character-card__name">Kim</div>
                            <div class="character-card__role">Main Character</div>
                        </div>
                    </div>
                    <div class="character-card">
                        <img src="./images/meryl.png" alt="meryl" class="character-card__image" />
                        <div class="character-card__info">
                            <div class="character-card__name">Meryl</div>
                            <div class="character-card__role">Main Character</div>
                        </div>
                    </div>
                    <div class="character-card">
                        <img src="./images/kim_placeholder.png" alt="judson" class="character-card__image" />
                        <div class="character-card__info">
                            <div class="character-card__name">Judson</div>
                            <div class="character-card__role">Main Antagonist</div>
                        </div>
                    </div>
                    <div class="character-card">
                        <img src="./images/kim_placeholder.png" alt="dombis" class="character-card__image" />
                        <div class="character-card__info">
                            <div class="character-card__name">Dombis</div>
                            <div class="character-card__role">Boss</div>
                        </div>
                    </div>
                    <div class="character-card">
                        <img src="./images/kim_placeholder.png" alt="ms-alpha" class="character-card__image" />
                        <div class="character-card__info">
                            <div class="character-card__name">Ms.Alpha</div>
                            <div class="character-card__role">Boss</div>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </body>
</html>
